<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            max-width: 600px;
            margin: 3rem auto;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f9f9f9;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        input[type="url"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 1.5rem;
            min-height: 2rem;
            padding: 1rem;
            border-radius: 4px;
            word-break: break-all;
        }

        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        a {
            color: #007bff;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 URL Shortener</h2>
    <p>Enter a long URL below to generate a short link.</p>

    <label for="url"></label>
    <input id="url" type="url" value="https://example.com" placeholder="https://example.com">
    <button onclick="shorten()">Shorten URL</button>

    <div id="result"></div>
</div>

<script>
    async function shorten() {
        const resultDiv = document.getElementById("result");
        const targetUrl = document.getElementById("url").value;

        resultDiv.className = "";
        resultDiv.innerHTML = "Processing...";

        try {

            // Use the host and port that served this HTML file.
            const response = await fetch("/shorten", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({url: targetUrl})
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

            const json = await response.json();

            resultDiv.className = "success";
            resultDiv.innerHTML = `
                <p>✅ <strong>Success!</strong></p>
                <p>Original: <a href="${json.url}" target="_blank">${json.url}</a></p>
                <p>Short URL: <a href="${json.shortUrl}" target="_blank">${json.shortUrl}</a></p>
            `;
        } catch (e) {
            resultDiv.className = "error";
            resultDiv.innerHTML = `
                <p>❌ <strong>Error processing request</strong></p>
                <p>${e.message}</p>
            `;
        }
    }
</script>
</body>
</html>
